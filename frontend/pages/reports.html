<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header"><h1>Reports & Analytics</h1><p>Detailed analytics and insights</p></div>
            <div class="kpi-grid" id="kpiGrid"></div>
            <div class="charts-grid">
                <div class="card"><div class="card-header"><h3 class="card-title">Department Activity</h3></div><div class="chart-container"><canvas id="deptChart"></canvas></div></div>
                <div class="card"><div class="card-header"><h3 class="card-title">Event Categories</h3></div><div class="chart-container"><canvas id="categoryChart"></canvas></div></div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
