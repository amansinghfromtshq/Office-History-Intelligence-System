<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Monitoring - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header"><h1>AI Monitoring</h1><p>Monitor AI usage, queries, and performance</p></div>
            <div class="kpi-grid" id="aiStats" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">
                <div class="card kpi-card"><div class="skeleton" style="height:80px"></div></div>
                <div class="card kpi-card"><div class="skeleton" style="height:80px"></div></div>
            </div>
            <div class="card" style="margin-top:20px">
                <div class="card-header"><h3 class="card-title">Recent AI Queries</h3></div>
                <div class="table-wrapper"><table><thead><tr><th>Question</th><th>Response</th><th>Response Time</th><th>Time</th></tr></thead><tbody id="aiLogsTable"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script><script src="../js/app.js"></script><script src="../js/admin.js"></script>
</body>
</html>
