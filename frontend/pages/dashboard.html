<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <h1>Dashboard</h1>
                <p id="userGreeting">Welcome back</p>
            </div>
            <div class="kpi-grid" id="kpiGrid">
                <div class="card kpi-card"><div class="skeleton" style="height:80px"></div></div>
                <div class="card kpi-card"><div class="skeleton" style="height:80px"></div></div>
                <div class="card kpi-card"><div class="skeleton" style="height:80px"></div></div>
                <div class="card kpi-card"><div class="skeleton" style="height:80px"></div></div>
            </div>
            <div class="charts-grid">
                <div class="card"><div class="card-header"><h3 class="card-title">Department Activity</h3></div><div class="chart-container"><canvas id="deptChart"></canvas></div></div>
                <div class="card"><div class="card-header"><h3 class="card-title">History Categories</h3></div><div class="chart-container"><canvas id="categoryChart"></canvas></div></div>
            </div>
            <div class="card">
                <div class="card-header"><h3 class="card-title">Recent Activity</h3></div>
                <div class="table-wrapper"><table><thead><tr><th>User</th><th>Action</th><th>Entity</th><th>Time</th></tr></thead><tbody id="activityList"><tr><td colspan="4"><div class="skeleton" style="height:20px;margin:8px 0"></div></td></tr></tbody></table></div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
