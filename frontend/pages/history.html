<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office History - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
                <div><h1>Office History</h1><p>Track events, meetings, transfers, and more</p></div>
                <button class="btn btn-primary" onclick="openAddHistoryModal()"><i class="bi bi-plus-lg"></i> Add Entry</button>
            </div>
            <div class="card"><div class="table-wrapper" id="historyList"><div class="spinner"></div></div></div>
            <!-- Add History Modal -->
            <div class="modal-overlay" id="addHistoryModal">
                <div class="modal">
                    <div class="modal-header"><h3>Add History Entry</h3><button class="modal-close" onclick="closeModal(this)">&times;</button></div>
                    <form onsubmit="submitHistory(event)">
                        <div class="form-group"><label>Title *</label><input type="text" id="histTitle" class="form-control" required></div>
                        <div class="form-group"><label>Description *</label><textarea id="histDesc" class="form-control" required></textarea></div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                            <div class="form-group"><label>Category</label>
                                <select id="histCategory" class="form-control">
                                    <option value="event">Event</option><option value="meeting">Meeting</option>
                                    <option value="joining">Joining</option><option value="transfer">Transfer</option>
                                    <option value="promotion">Promotion</option><option value="compliance">Compliance</option>
                                    <option value="inspection">Inspection</option><option value="retirement">Retirement</option>
                                    <option value="order">Order</option><option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group"><label>Event Date *</label><input type="date" id="histDate" class="form-control" required></div>
                        </div>
                        <div class="form-group"><label>Department ID</label><input type="text" id="histDept" class="form-control"></div>
                        <div class="form-group"><label>Persons Involved (comma-separated)</label><input type="text" id="histPersons" class="form-control"></div>
                        <button type="submit" class="btn btn-primary btn-block">Save Entry</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
