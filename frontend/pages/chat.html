<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content" style="padding:20px">
            <div class="chat-layout">
                <div class="chat-sidebar">
                    <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
                        <div class="card-header"><h3 class="card-title">Chat History</h3></div>
                        <div id="chatHistoryList" style="flex:1;overflow-y:auto"></div>
                        <div style="padding:12px;border-top:1px solid var(--border)">
                            <h4 style="font-size:0.75rem;color:var(--text-muted);margin-bottom:8px">Try asking:</h4>
                            <div id="suggestions"></div>
                        </div>
                    </div>
                </div>
                <div class="chat-main card" style="display:flex;flex-direction:column;overflow:hidden;padding:0">
                    <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
                        <h3 style="font-size:1rem"><i class="bi bi-robot" style="color:var(--accent-start)"></i> AI Knowledge Assistant</h3>
                        <p style="font-size:0.78rem;color:var(--text-muted)">Ask anything about office history, documents, employees, and more</p>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai">👋 Hello! I'm your Office Intelligence Assistant. Ask me anything about your office history, documents, employees, meetings, or compliance records.</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" class="form-control" placeholder="Ask a question about office history...">
                        <button class="btn btn-primary" onclick="sendMessage()"><i class="bi bi-send"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/chat.js"></script>
</body>
</html>
