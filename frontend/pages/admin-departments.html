<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
                <div><h1>Departments</h1><p>Manage organizational departments</p></div>
                <button class="btn btn-primary" onclick="document.getElementById('addDeptModal').classList.add('active')"><i class="bi bi-plus-lg"></i> Add Department</button>
            </div>
            <div class="card">
                <div class="table-wrapper"><table><thead><tr><th>Name</th><th>Description</th><th>Head Officer</th><th>Created</th><th>Actions</th></tr></thead><tbody id="deptsTable"><tr><td colspan="5"><div class="spinner"></div></td></tr></tbody></table></div>
            </div>
            <div class="modal-overlay" id="addDeptModal">
                <div class="modal">
                    <div class="modal-header"><h3>Add Department</h3><button class="modal-close" onclick="this.closest('.modal-overlay').classList.remove('active')">&times;</button></div>
                    <form onsubmit="createDept(event)">
                        <div class="form-group"><label>Name *</label><input type="text" id="deptName" class="form-control" required></div>
                        <div class="form-group"><label>Description</label><textarea id="deptDesc" class="form-control"></textarea></div>
                        <div class="form-group"><label>Head Officer</label><input type="text" id="deptHead" class="form-control"></div>
                        <button type="submit" class="btn btn-primary btn-block">Create Department</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script><script src="../js/app.js"></script><script src="../js/admin.js"></script>
</body>
</html>
