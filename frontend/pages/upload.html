<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header"><h1>Upload Document</h1><p>Upload and process office documents for AI search</p></div>
            <div class="card" style="max-width:700px">
                <form id="uploadForm">
                    <div class="upload-zone" id="uploadZone">
                        <i class="bi bi-cloud-arrow-up"></i>
                        <h3>Drag & drop your file here</h3>
                        <p>or click to browse · PDF, DOCX, XLSX, TXT (max 50MB)</p>
                        <input type="file" id="fileInput" accept=".pdf,.docx,.xlsx,.xls,.txt" hidden>
                        <p id="fileName" style="display:none;margin-top:12px;color:var(--accent-start);font-weight:600"></p>
                    </div>
                    <div class="progress-bar" style="margin-bottom:24px"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="form-group">
                        <label for="docTitle">Document Title *</label>
                        <input type="text" id="docTitle" class="form-control" placeholder="e.g. Annual Budget Report 2026" required>
                    </div>
                    <div class="form-group">
                        <label for="docDesc">Description</label>
                        <textarea id="docDesc" class="form-control" placeholder="Brief description of the document"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                        <div class="form-group">
                            <label for="docDept">Department</label>
                            <input type="text" id="docDept" class="form-control" placeholder="Department ID">
                        </div>
                        <div class="form-group">
                            <label for="docCategory">Category</label>
                            <select id="docCategory" class="form-control">
                                <option value="general">General</option>
                                <option value="meeting_notes">Meeting Notes</option>
                                <option value="orders">Orders</option>
                                <option value="compliance">Compliance</option>
                                <option value="policies">Policies</option>
                                <option value="reports">Reports</option>
                                <option value="circulars">Circulars</option>
                                <option value="employee_files">Employee Files</option>
                                <option value="notifications">Notifications</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="docTags">Tags (comma-separated)</label>
                        <input type="text" id="docTags" class="form-control" placeholder="e.g. budget, finance, 2026">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block"><i class="bi bi-cloud-upload"></i> Upload Document</button>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/documents.js"></script>
</body>
</html>
