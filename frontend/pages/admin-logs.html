<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - Office Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <button class="sidebar-toggle"><i class="bi bi-list"></i></button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header"><h1>Audit Logs</h1><p>Track all system activity and user actions</p></div>
            <div class="card">
                <div class="table-wrapper"><table><thead><tr><th>User</th><th>Action</th><th>Entity</th><th>IP Address</th><th>Time</th></tr></thead><tbody id="logsTable"><tr><td colspan="5"><div class="spinner"></div></td></tr></tbody></table></div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script><script src="../js/app.js"></script><script src="../js/admin.js"></script>
</body>
</html>
