<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Office History Intelligence System</title>
    <meta name="description" content="AI-powered Office Knowledge Base and History Management System">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo">
                <h1>🧠 Office Intelligence</h1>
                <p>AI-Powered Knowledge Management System</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@office.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-secondary)">
                    Don't have an account? <a href="register.html">Create one</a>
                </p>
                <p style="text-align:center;margin-top:12px;font-size:0.75rem;color:var(--text-muted)">
                    Demo: admin@office.com / password123
                </p>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
